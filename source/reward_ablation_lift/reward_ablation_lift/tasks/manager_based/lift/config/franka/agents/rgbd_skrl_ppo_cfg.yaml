seed: 42


# Models are instantiated using skrl's model instantiator utility
# https://skrl.readthedocs.io/en/latest/api/utils/model_instantiators.html
models:
  separate: True
  policy:  # see gaussian_model parameters
    class: GaussianMixin
    clip_actions: False
    clip_log_std: True
    min_log_std: -20.0
    max_log_std: 2.0
    initial_log_std: 0.0
    network:
      - name: cnn_features
        input: permute(OBSERVATIONS["image"], (0, 3, 1, 2))
        layers:
          - conv2d: {out_channels: 16, kernel_size: 8, stride: 4, padding: 0}
          - conv2d: {out_channels: 16, kernel_size: 4, stride: 2, padding: 0}
          - conv2d: {out_channels: 32, kernel_size: 3, stride: 1, padding: 0}
          - flatten
          - linear: 64
        activations: [relu, relu, relu, null, relu]
      
      # 合并后的 head
      - name: net
        input: concatenate([cnn_features, OBSERVATIONS["proprio"]])
        layers: [64, 128]
        activations: elu
    output: ACTIONS

  value:
    class: DeterministicMixin
    clip_actions: False
    network:
      # DrQ-v2 CNN Encoder (独立参数)
      - name: cnn_features
        input: permute(OBSERVATIONS["image"], (0, 3, 1, 2))
        layers:
          - conv2d: {out_channels: 16, kernel_size: 8, stride: 4, padding: 0}
          - conv2d: {out_channels: 16, kernel_size: 4, stride: 2, padding: 0}
          - conv2d: {out_channels: 32, kernel_size: 3, stride: 1, padding: 0}
          - flatten
          - linear: 64
        activations: [relu, relu, relu, null, relu]

      - name: net
        input: concatenate([cnn_features, OBSERVATIONS["proprio"]])
        layers: [64, 128]
        activations: elu
    output: ONE


# Rollout memory
# https://skrl.readthedocs.io/en/latest/api/memories/random.html
memory:
  class: RandomMemory
  memory_size: -1  # automatically determined (same as agent:rollouts)


# PPO agent configuration (field names are from PPO_DEFAULT_CONFIG)
# https://skrl.readthedocs.io/en/latest/api/agents/ppo.html
agent:
  class: PPO
  rollouts: 16
  learning_epochs: 6
  mini_batches: 4
  discount_factor: 0.99
  lambda: 0.95
  learning_rate: 3.0e-04
  learning_rate_scheduler: KLAdaptiveLR
  learning_rate_scheduler_kwargs:
    kl_threshold: 0.01
  state_preprocessor: null
  state_preprocessor_kwargs: null
  value_preprocessor: null
  value_preprocessor_kwargs: null
  random_timesteps: 0
  learning_starts: 0
  grad_norm_clip: 1.0
  ratio_clip: 0.2
  value_clip: 0.2
  clip_predicted_values: True
  entropy_loss_scale: 0.01
  value_loss_scale: 2.0
  kl_threshold: 0.0
  rewards_shaper_scale: 1.0
  time_limit_bootstrap: False
  mixed_precision: True
  # logging and checkpoint
  experiment:
    directory: "franka_lift"
    experiment_name: ""
    write_interval: auto
    checkpoint_interval: 25000         # 不存中间的
    store_separately: False


# Sequential trainer
# https://skrl.readthedocs.io/en/latest/api/trainers/sequential.html
trainer:
  class: SequentialTrainer
  timesteps: 75000
  # disable_progressbar: True
  environment_info: log